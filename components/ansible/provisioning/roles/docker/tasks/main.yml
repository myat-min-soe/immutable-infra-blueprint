---
# Docker Role - Verify Docker Engine (CE) is installed and apply configs
# Idempotent: checks if Docker is already installed before proceeding

- name: Check if Docker is installed
  command: dpkg-query -W -f='${Status}' docker-ce
  register: docker_check
  failed_when: false
  changed_when: false

- name: Assert Docker is installed
  assert:
    that:
      - docker_check.rc == 0
    fail_msg: "Docker is not installed. This AMI is invalid as it should be pre-baked."
    success_msg: "Docker is installed."

# ── Post-install Configuration ──
- name: Add ubuntu user to docker group
  user:
    name: ubuntu
    groups: docker
    append: yes

- name: Ensure Docker is enabled and started
  systemd:
    name: docker
    state: started
    enabled: yes

# ── Verification ──
- name: Verify Docker is running
  command: docker --version
  register: docker_final
  changed_when: false

- name: Display Docker verification result
  debug:
    msg: "Docker version: {{ docker_final.stdout }}"
