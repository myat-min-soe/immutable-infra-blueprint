base_path: "./"

components:
  terraform:
    base_path: "components/terraform"
    apply_auto_approve: true
    deploy_run_init: true
    init_run_reconfigure: true
    auto_generate_backend_file: true
  ansible:
    base_path: "components/ansible"
  packer:
    base_path: "components/packer"

stacks:
  base_path: "stacks"
  included_paths:
  - "deploy/**/*"
  excluded_paths:
  - "**/_defaults.yaml"
  name_pattern: "{stage}"

templates:
  enabled: true

logs:
  file: "/dev/stderr"
  level: Info
