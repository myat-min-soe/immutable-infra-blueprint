import:
  - catalog/base/defaults
  - catalog/compute/defaults
  - catalog/ansible/defaults
  - mixins/region/ap-southeast-1
  - mixins/stage/production

vars:
  aws_id: "xxxxxxxxxxxxxx"



components:
  terraform:
    base:
      vars:
        vpc_name: "production-vpc"
        vpc_cidr: "10.4.0.0/16"
        public_subnet_cidr: ["10.4.1.0/24", "10.4.2.0/24", "10.4.3.0/24"]
        private_subnet_cidr: ["10.4.4.0/24", "10.4.5.0/24", "10.4.6.0/24", "10.4.7.0/24", "10.4.8.0/24", "10.4.9.0/24" ]
        acm_arn: "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

    compute:
      vars:
        domain_name: "production.example.com"
        codedeploy_app_name: "production-app"
        deployment_group_name: "production-deployment-group"
        deploy_bucket_name: "production-deploy-bucket"
        storage_bucket_name: "production-storage-bucket"
        cicd_user_name: "cicd-production-user"


  ansible:
    provisioning:
      vars:
        env_name: "production"
      env:
        EC2_TAG_FILTER: "production-instance"
        SSM_BUCKET_NAME: "production-storage-bucket-xxxxxxxxxxx"
        START_MYSQL_SERVER: "false"
