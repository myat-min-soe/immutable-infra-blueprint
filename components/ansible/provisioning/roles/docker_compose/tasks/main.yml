---
# Docker Compose Role - Verify Docker Compose v2 plugin is installed
# Idempotent: checks if Docker Compose is already installed before proceeding

- name: Check if Docker Compose is installed
  command: docker compose version
  register: compose_check
  ignore_errors: true
  changed_when: false

- name: Assert Docker Compose is installed
  assert:
    that:
      - compose_check.rc == 0
    fail_msg: "Docker Compose is not installed. This AMI is invalid as it should be pre-baked."
    success_msg: "Docker Compose is installed."

# ── Verification ──
- name: Verify Docker Compose is working
  command: docker compose version
  register: compose_final
  changed_when: false

- name: Display Docker Compose verification result
  debug:
    msg: "Docker Compose version: {{ compose_final.stdout }}"
