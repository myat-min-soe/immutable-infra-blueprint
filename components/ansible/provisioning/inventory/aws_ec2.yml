---
# Shared dynamic inventory for all environments.
# Values are supplied via environment variables set in each Atmos stack's env: section:
#   AWS_REGION      — e.g. ap-southeast-1
#   EC2_TAG_FILTER  — e.g. develop-Instance
#   SSM_BUCKET_NAME — e.g. develop-storage-bucket-118955426917

plugin: amazon.aws.aws_ec2

regions:
  - "{{ lookup('env', 'AWS_REGION') }}"

filters:
  tag:Name: "{{ lookup('env', 'EC2_TAG_FILTER') }}"
  instance-state-name: running

hostnames:
  - instance-id

compose:
  ansible_connection: "'aws_ssm'"
  ansible_aws_ssm_region: "lookup('env', 'AWS_REGION')"
  ansible_aws_ssm_bucket_name: "lookup('env', 'SSM_BUCKET_NAME')"
  ansible_aws_ssm_timeout: 3600
  ansible_aws_ssm_retries: 3
