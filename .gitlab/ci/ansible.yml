# ==============================================================================
# ANSIBLE CHILD PIPELINE
# ==============================================================================

image: debian:bookworm-slim

variables:
  AWS_DEFAULT_REGION: ap-southeast-1
  ATMOS_VERSION: "1.209.0"
  ANSIBLE_VERSION: "11.5.0"
  ANSIBLE_FORCE_COLOR: "true"
  ANSIBLE_HOST_KEY_CHECKING: "false"

stages:
  - provision
  - verify

# ─── Install Tools ─────────────────────────────────────────────────────────────

.install_ansible_tools: &install_ansible_tools
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends curl jq bash openssh-client python3 python3-pip python3-venv unzip ca-certificates
    - rm -rf /var/lib/apt/lists/*

    # Install Atmos
    - curl -fsSL "https://github.com/cloudposse/atmos/releases/download/v${ATMOS_VERSION}/atmos_${ATMOS_VERSION}_linux_amd64" -o /usr/local/bin/atmos
    - chmod +x /usr/local/bin/atmos

    # Install Ansible + AWS dependencies
    - pip3 install --break-system-packages ansible==${ANSIBLE_VERSION} boto3 botocore

    # Install Ansible AWS collections
    - ansible-galaxy collection install community.aws amazon.aws

    # Install AWS Session Manager Plugin
    - curl -fsSL "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb" -o session-manager-plugin.deb
    - dpkg -i session-manager-plugin.deb
    - rm -f session-manager-plugin.deb

    # Setup AWS Credentials
    - export AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
    - export AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
    - export AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}

# ─── Provision ─────────────────────────────────────────────────────────────────

provision:develop:
  stage: provision
  <<: *install_ansible_tools
  script:
    - echo "📦 Configuring develop server..."
    - unset AWS_PROFILE
    - atmos ansible playbook provisioning -s develop
    - cat components/ansible/provisioning/versions/develop_versions.json
  artifacts:
    paths: [components/ansible/provisioning/versions/develop_versions.json]
    expire_in: 30 days
  when: manual

provision:uat:
  stage: provision
  <<: *install_ansible_tools
  script:
    - echo "📦 Configuring UAT server..."
    - unset AWS_PROFILE
    - atmos ansible playbook provisioning -s uat
    - cat components/ansible/provisioning/versions/uat_versions.json
  artifacts:
    paths: [components/ansible/provisioning/versions/uat_versions.json]
    expire_in: 30 days
  when: manual

provision:preprod:
  stage: provision
  <<: *install_ansible_tools
  script:
    - echo "📦 Configuring preprod server..."
    - unset AWS_PROFILE
    - atmos ansible playbook provisioning -s preprod
    - cat components/ansible/provisioning/versions/preprod_versions.json
  artifacts:
    paths: [components/ansible/provisioning/versions/preprod_versions.json]
    expire_in: 30 days
  when: manual

provision:prod:
  stage: provision
  <<: *install_ansible_tools
  script:
    - echo "📦 Configuring production server..."
    - unset AWS_PROFILE
    - atmos ansible playbook provisioning -s prod
    - cat components/ansible/provisioning/versions/prod_versions.json
  artifacts:
    paths: [components/ansible/provisioning/versions/prod_versions.json]
    expire_in: 30 days
  environment:
    name: production
    url: https://www.punhlainghospitals.com
  when: manual

# ─── Verify ────────────────────────────────────────────────────────────────────

verify:versions:
  stage: verify
  image: debian:bookworm-slim
  script:
    - apt-get update && apt-get install -y --no-install-recommends jq && rm -rf /var/lib/apt/lists/*
    - echo "📊 Package version comparison across environments:"
    - >
      for f in components/ansible/provisioning/versions/*_versions.json; do
        if [ -f "$f" ]; then
          env=$(jq -r '.environment' "$f");
          echo "\n── ${env} ──";
          jq -r '.packages | to_entries[] | "  \(.key): \(.value)"' "$f";
        fi;
      done
  allow_failure: true
  when: manual
