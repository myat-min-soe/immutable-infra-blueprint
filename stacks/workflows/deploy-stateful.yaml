workflows:
  deploy-stateful:
    description: Sequentially deploy the foundation, database, and compute layers for a given environment.

    steps:
      - name: Validating terraform layers
        command: terraform validate base

      - name: Applying the networking base layer
        command: terraform apply base -auto-approve

      - name: Applying the database stateful layer
        command: terraform apply database -auto-approve

      - name: Applying the stateless compute layer
        command: terraform apply compute -auto-approve

      - name: Running Ansible Provisioning
        command: ansible playbook provisioning
