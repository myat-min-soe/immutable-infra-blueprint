vars:
  stage: uat_base

components:
  terraform:
    base:
      backend_type: s3
      backend:
        s3:
          bucket: "Demo-terraform-backend-storage"
          use_lockfile: true
          region: "ap-southeast-1"
          key: "uat_base.tfstate"
          encrypt: true
      vars:
        environment: "uat"
        aws_id: "xxxxxxxxxxxxxxxxx"
        region: "ap-southeast-1"
        vpc_name: "uat-vpc"
        vpc_cidr: "10.1.0.0/16"
        create_nat: true
        azs: ["ap-southeast-1a", "ap-southeast-1b", "ap-southeast-1c"]
        public_subnet_cidr: ["10.1.1.0/24", "10.1.2.0/24", "10.1.3.0/24"]
        private_subnet_cidr: ["10.1.4.0/24", "10.1.5.0/24", "10.1.6.0/24"]
        acm_arn: "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
