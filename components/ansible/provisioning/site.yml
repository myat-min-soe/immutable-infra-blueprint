---
# Server Provisioning Playbook
# Packages are pre-baked into the AMI by Packer.
# Ansible verifies services are running and applies configuration only.

- name: Server Provisioning
  hosts: all
  become: yes
  gather_facts: yes

  pre_tasks:
    - name: Display provisioning target
      debug:
        msg: "Provisioning {{ inventory_hostname }} ({{ env_name | default('unknown') }} environment)"

    - name: Display environment config
      debug:
        msg: |
          Environment: {{ env_name | default('unknown') }}
          install_mysql_server: {{ install_mysql_server | default(false) }}

  roles:
    - role: nginx
      tags: [nginx]

    - role: docker
      tags: [docker]

    - role: docker_compose
      tags: [docker-compose]

    - role: mysql_client
      tags: [mysql-client]

    - role: mysql_server
      tags: [mysql-server]

    - role: version_report
      tags: [version-report]

  post_tasks:
    - name: Provisioning Summary
      debug:
        msg: |
          ✅ Provisioning complete for {{ inventory_hostname }}
          Environment: {{ env_name | default('unknown') }}
          MySQL Server: {{ 'enabled' if (lookup('env', 'START_MYSQL_SERVER') | default('false', true) | bool) else 'disabled (using RDS)' }}
