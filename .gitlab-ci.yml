# ==============================================================================
# Demo Infrastructure CI/CD Pipeline (PARENT ROUTER)
# ==============================================================================
# This is a Parent-Child pipeline architecture. 
# You can manually trigger specific infrastructure components below.
# ==============================================================================

stages:
  - trigger-packer
  - trigger-terraform
  - trigger-ansible

# ██████████████████████████████████████████████████████████████████████████████
# PACKER (AMI Baking)
# ██████████████████████████████████████████████████████████████████████████████

packer-pipeline:
  stage: trigger-packer
  trigger:
    include: .gitlab/ci/packer.yml
    strategy: depend
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
      changes:
        - components/packer/phh-ami/**/*
        - stacks/deploy/packer.yaml
        - .gitlab/ci/packer.yml
      when: manual
      allow_failure: true

# ██████████████████████████████████████████████████████████████████████████████
# TERRAFORM (Infrastructure Provisioning)
# ██████████████████████████████████████████████████████████████████████████████

terraform-pipeline:
  stage: trigger-terraform
  trigger:
    include: .gitlab/ci/terraform.yml
    strategy: depend
  rules:
    - when: manual
      allow_failure: true

# ██████████████████████████████████████████████████████████████████████████████
# ANSIBLE (Server Configuration)
# ██████████████████████████████████████████████████████████████████████████████

ansible-pipeline:
  stage: trigger-ansible
  trigger:
    include: .gitlab/ci/ansible.yml
    strategy: depend
  rules:
    - when: manual
      allow_failure: true
